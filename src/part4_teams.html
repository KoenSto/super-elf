<script>
/* ============ Team helpers ============ */
let TEAM_LIST = []; // [{key, speler, teamnaam, basis, wissels, totaal_weken, tsId}]
function buildTeamList(){
  const naamToId = {};
  Object.entries(DATA.tussenstand).forEach(([id,v])=>{ naamToId[v.naam]=id; });
  TEAM_LIST = Object.entries(STATE.teams).map(([key,t])=>{
    const tsId = naamToId[t.teamnaam] !== undefined ? naamToId[t.teamnaam] : naamToId[t.speler];
    return {key, ...t, tsId};
  });
}
function origineelTotaal(team){
  if(team.tsId===undefined) return null;
  return DATA.tussenstand[team.tsId].weken['Totaal'];
}
function origineelRonde(team, ronde){
  if(team.tsId===undefined) return null;
  const v = DATA.tussenstand[team.tsId].weken[String(ronde)];
  return v===undefined ? null : v;
}
function computeFormatie(basis){
  const c = {K:0,V:0,M:0,A:0};
  basis.forEach(b=>{ if(c[b.positie]!==undefined) c[b.positie]++; });
  return `${c.V}-${c.M}-${c.A}`;
}
function computeBudget(team){
  const basisGebruikt = team.basis.reduce((s,p)=>s+(p.prijs||0),0);
  const wisselsGebruikt = team.wissels.reduce((s,p)=>s+(p.prijs||0),0);
  return {
    basisGebruikt, wisselsGebruikt, totaalGebruikt: basisGebruikt+wisselsGebruikt,
    resterend: DATA.spelregels.budget - basisGebruikt,
    aantal: team.basis.length + team.wissels.length
  };
}
function getSpelerPuntenInRonde(ronde, naam){
  const rd = STATE.rounds[String(ronde)];
  if(!rd) return null;
  for(const m of rd.matches){
    const resThuis = matchResultaat(m.uitslagThuis, m.uitslagUit);
    const resUit = matchResultaat(m.uitslagUit, m.uitslagThuis);
    for(const sp of m.spelersThuis){ if(sp.naam===naam) return berekenPunten(sp.positie,resThuis,sp); }
    for(const sp of m.spelersUit){ if(sp.naam===naam) return berekenPunten(sp.positie,resUit,sp); }
  }
  return null;
}
function liveTotaalRonde(team, ronde){
  let total = 0, gevonden = 0;
  team.basis.concat(team.wissels).forEach(p=>{
    const pts = getSpelerPuntenInRonde(ronde, p.naam);
    if(pts!==null){ total += pts; gevonden++; }
  });
  return {total, gevonden};
}

/* ============ Team mutaties (toevoegen/verwijderen) ============ */
function slugify(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
function addTeam(speler, teamnaam){
  speler = (speler||'').trim() || 'Nieuwe deelnemer';
  teamnaam = (teamnaam||'').trim() || 'Nieuw team';
  const key = 'custom_' + slugify(teamnaam) + '_' + Date.now();
  STATE.teams[key] = { speler, teamnaam, basis: [], wissels: [], totaal_weken: {} };
  saveState();
  buildTeamList();
  selectedTeamKey = key;
  renderTeamsGrid();
  renderTeamDetail();
  const detailEl = document.getElementById('teamDetail');
  if(detailEl.scrollIntoView) detailEl.scrollIntoView({behavior:'smooth'});
}
function removeTeam(key){
  const team = STATE.teams[key];
  if(!team) return;
  if(!confirm(`Team "${team.teamnaam}" (${team.speler}) verwijderen? Dit kan niet ongedaan worden gemaakt.`)) return;
  delete STATE.teams[key];
  saveState();
  buildTeamList();
  if(selectedTeamKey===key) selectedTeamKey = null;
  renderTeamsGrid();
  renderTeamDetail();
}
function addBasisSpeler(teamKey, club, naam){
  const p = STATE.players.find(pl=>pl.club===club && pl.naam===naam);
  if(!p){ alert('Kies een geldige speler.'); return; }
  const team = STATE.teams[teamKey];
  if(team.basis.some(b=>b.naam===naam)){ alert('Deze speler staat al in de basisopstelling.'); return; }
  team.basis.push({club:p.club, naam:p.naam, prijs:p.prijs, positie:p.positie, weken:{}, sinds_ronde:null, mogelijke_wissel:false});
  saveState(); buildTeamList(); renderTeamDetail();
}
function removeBasisSpeler(teamKey, idx){
  const team = STATE.teams[teamKey];
  team.basis.splice(idx,1);
  saveState(); buildTeamList(); renderTeamDetail();
}
const WISSEL_TYPES = {
  regulier: {label:'Reguliere wissel', badge:'', telt_mee:true},
  vrij: {label:'Vrije wissel (transfer/contractontbinding)', badge:'flag', telt_mee:false}
};
function addWissel(teamKey, club, naam, vanafRonde, uitNaam, type){
  const p = STATE.players.find(pl=>pl.club===club && pl.naam===naam);
  if(!p){ alert('Kies een geldige speler om in te wisselen.'); return; }
  const team = STATE.teams[teamKey];
  if(team.wissels.some(w=>w.naam===naam) || team.basis.some(b=>b.naam===naam)){ alert('Deze speler staat al in dit team.'); return; }
  if(!WISSEL_TYPES[type]) type = 'regulier';

  let vervangenSpeler = null;
  if(team.basis.length>0){
    if(!uitNaam){ alert('Kies welke speler uit de basiself wordt gewisseld.'); return; }
    const uitIdx = team.basis.findIndex(b=>b.naam===uitNaam);
    if(uitIdx===-1){ alert('De geselecteerde uit-speler is niet (meer) gevonden in de basis.'); return; }
    vervangenSpeler = team.basis[uitIdx];
    team.basis.splice(uitIdx,1);
  }

  const volgnr = team.wissels.length ? Math.max(...team.wissels.map(w=>w.volgnr||0))+1 : 1;
  const ronde = Number(vanafRonde) || STATE.huidigeRonde;
  team.wissels.push({
    volgnr, club:p.club, naam:p.naam, prijs:p.prijs, positie:p.positie, weken:{},
    vanaf_ronde: ronde, laatste_ronde: 34, handmatig:true, type,
    vervangenSpeler: vervangenSpeler ? {naam:vervangenSpeler.naam, club:vervangenSpeler.club, positie:vervangenSpeler.positie, prijs:vervangenSpeler.prijs} : null
  });
  STATE.wisselLog.push({
    teamKey, ronde, tijdstip: new Date().toISOString(), type,
    uit: vervangenSpeler ? {naam:vervangenSpeler.naam, club:vervangenSpeler.club} : null,
    in: {naam:p.naam, club:p.club}
  });
  saveState(); buildTeamList(); renderTeamDetail();
}
function removeWissel(teamKey, idx){
  const team = STATE.teams[teamKey];
  const w = team.wissels[idx];
  if(!w) return;
  if(!confirm(`Wissel van ${w.vervangenSpeler ? w.vervangenSpeler.naam+' naar ' : ''}${w.naam} ongedaan maken? De speler die destijds werd vervangen wordt niet automatisch teruggezet in de basis.`)) return;
  team.wissels.splice(idx,1);
  saveState(); buildTeamList(); renderTeamDetail();
}
function removeWisselLogEntry(idx){
  STATE.wisselLog.splice(idx,1);
  saveState(); renderTeamDetail();
}

/* pending (niet-opgeslagen) keuzes in de "toevoegen"-formuliertjes per team */
const pendingBasisClub = {}, pendingBasisSpeler = {};
const pendingWisselClub = {}, pendingWisselSpeler = {}, pendingWisselRonde = {}, pendingWisselUit = {}, pendingWisselType = {};

function clubOptionsHTML(selected){
  return DATA.clubs.map(c=>`<option value="${esc(c)}" ${c===selected?'selected':''}>${esc(c)}</option>`).join('');
}
function playerOptionsHTML(club, selectedNaam){
  const list = playersOfClub(club);
  return list.map(p=>`<option value="${esc(p.naam)}" ${p.naam===selectedNaam?'selected':''}>${esc(p.naam)} (${p.positie}, ${fmtGeld(p.prijs)})</option>`).join('');
}

/* ============ TAB: Teams ============ */
let selectedTeamKey = null;
function initTeamsTab(){
  buildTeamList();
  document.getElementById('teamSearch').addEventListener('input', renderTeamsGrid);
  document.getElementById('btnAddTeam').addEventListener('click', ()=>{
    const speler = document.getElementById('newTeamSpeler').value;
    const teamnaam = document.getElementById('newTeamNaam').value;
    if(!speler.trim() && !teamnaam.trim()){ alert('Vul minimaal een teamnaam of spelernaam in.'); return; }
    addTeam(speler, teamnaam);
    document.getElementById('newTeamSpeler').value = '';
    document.getElementById('newTeamNaam').value = '';
  });
  renderTeamsGrid();
}
function renderTeamsGrid(){
  const q = (document.getElementById('teamSearch').value||'').toLowerCase();
  const grid = document.getElementById('teamsGrid');
  const sorted = [...TEAM_LIST].sort((a,b)=>(origineelTotaal(b)||0)-(origineelTotaal(a)||0));
  grid.innerHTML = '';
  sorted.forEach((team, idx)=>{
    if(q && !(team.teamnaam.toLowerCase().includes(q) || team.speler.toLowerCase().includes(q))) return;
    const card = document.createElement('div');
    card.className = 'team-card';
    card.dataset.teamKey = team.key;
    const isCustom = team.key.startsWith('custom_');
    card.innerHTML = `<div class="rank">${isCustom?'<span class="flag">nieuw</span>':'#'+(idx+1)}</div>
      <div class="tot">${origineelTotaal(team)??'-'}</div>
      <div class="name">${esc(team.teamnaam)}</div>
      <div class="sub">${esc(team.speler)}</div>`;
    card.addEventListener('click', ()=>{ selectedTeamKey = team.key; renderTeamDetail(); document.getElementById('teamDetail').scrollIntoView({behavior:'smooth'}); });
    grid.appendChild(card);
  });
}
function sparkline(weken){
  const vals = [];
  for(let i=1;i<=34;i++) vals.push(weken[String(i)] ?? weken[i] ?? null);
  const max = Math.max(1, ...vals.map(v=>v||0));
  return `<div style="display:flex;align-items:flex-end;gap:2px;height:40px;">${vals.map(v=>{
    const h = v==null ? 2 : Math.max(2, Math.round((v/max)*38));
    const color = v==null ? '#333' : (v<0 ? 'var(--neg)':'var(--accent2)');
    return `<div title="${v==null?'geen data':v+' pt'}" style="width:6px;height:${h}px;background:${color};border-radius:2px;"></div>`;
  }).join('')}</div>`;
}
function renderTeamDetail(){
  const el = document.getElementById('teamDetail');
  if(!selectedTeamKey){ el.innerHTML=''; return; }
  const team = TEAM_LIST.find(t=>t.key===selectedTeamKey);
  if(!team){ el.innerHTML=''; return; }
  const budget = computeBudget(team);
  const formatie = computeFormatie(team.basis);
  const ronde = STATE.huidigeRonde;
  const live = liveTotaalRonde(team, ronde);
  const orig = origineelRonde(team, ronde);
  const diff = (orig!==null) ? (live.total - orig) : null;

  const posOrder = {K:0,V:1,M:2,A:3};
  const basisSorted = team.basis.map((b,i)=>({...b,_idx:i})).sort((a,b)=>posOrder[a.positie]-posOrder[b.positie]);

  const basisRows = basisSorted.map(b=>{
    const lp = getSpelerPuntenInRonde(ronde, b.naam);
    return `<tr><td style="border-left:4px solid ${posLineColor(b.positie)};"><span class="badge ${b.positie}">${b.positie}</span></td><td>${esc(b.naam)}</td><td class="muted">${esc(b.club)}</td>
      <td class="muted">${fmtGeld(b.prijs)}</td>
      <td>${b.mogelijke_wissel ? `<span class="flag">mogelijk gewisseld ~ronde ${b.sinds_ronde}</span>` : '<span class="muted small">vanaf start</span>'}</td>
      <td class="pts ${lp>0?'pos':(lp<0?'neg':'')}">${lp===null?'<span class="muted">–</span>':lp}</td>
      <td><span class="close-btn" title="verwijder uit basis" data-remove-basis="${team.key}" data-remove-basis-idx="${b._idx}">✕</span></td></tr>`;
  }).join('') || '<tr><td colspan="7" class="muted">Nog geen basisspelers. Voeg ze hieronder toe.</td></tr>';

  const wisselRows = team.wissels.map((w,i)=>{
    const lp = getSpelerPuntenInRonde(ronde, w.naam);
    let geschat = w.handmatig ? `vanaf ronde ${w.vanaf_ronde}` :
      (w.vanaf_ronde===1 ? 'vanaf competitiestart' : `geschat vanaf ronde ${w.vanaf_ronde??'?'}`);
    if(!w.handmatig && w.laatste_ronde && w.laatste_ronde<34) geschat += ` t/m ronde ${w.laatste_ronde} (mogelijk later zelf vervangen)`;
    const typeInfo = w.type ? WISSEL_TYPES[w.type] : null;
    const typeBadge = typeInfo ? `<span class="${typeInfo.badge||'pill'}" style="font-size:10px;">${typeInfo.telt_mee?'regulier':'vrij (transfer)'}</span>` : '<span class="muted small">–</span>';
    return `<tr><td style="border-left:4px solid ${posLineColor(w.positie)};">#${w.volgnr}</td><td><span class="badge ${w.positie}">${w.positie}</span></td><td>${esc(w.naam)}</td><td class="muted">${esc(w.club)}</td>
      <td class="muted">${fmtGeld(w.prijs)}</td><td class="small muted">${geschat}</td><td>${typeBadge}</td>
      <td class="pts ${lp>0?'pos':(lp<0?'neg':'')}">${lp===null?'<span class="muted">–</span>':lp}</td>
      <td><span class="close-btn" title="verwijder wissel" data-remove-wissel="${team.key}" data-remove-wissel-idx="${i}">✕</span></td></tr>`;
  }).join('') || '<tr><td colspan="9" class="muted">Geen wissels gebruikt.</td></tr>';

  const pbClub = pendingBasisClub[team.key] || DATA.clubs[0];
  const pbSpeler = pendingBasisSpeler[team.key] || (playersOfClub(pbClub)[0] && playersOfClub(pbClub)[0].naam) || '';
  const pwClub = pendingWisselClub[team.key] || DATA.clubs[0];
  const pwSpeler = pendingWisselSpeler[team.key] || (playersOfClub(pwClub)[0] && playersOfClub(pwClub)[0].naam) || '';
  const pwRonde = pendingWisselRonde[team.key] || ronde;
  const pwUit = pendingWisselUit[team.key] || (team.basis[0] && team.basis[0].naam) || '';
  const pwType = pendingWisselType[team.key] || 'regulier';
  const uitOptionsHTML = team.basis.map(b=>`<option value="${esc(b.naam)}" ${b.naam===pwUit?'selected':''}>${esc(b.naam)} (${b.positie}, ${esc(b.club)})</option>`).join('');
  const typeOptionsHTML = Object.entries(WISSEL_TYPES).map(([k,v])=>`<option value="${k}" ${k===pwType?'selected':''}>${v.label}</option>`).join('');
  const regulierGebruikt = team.wissels.filter(w=>!w.type || WISSEL_TYPES[w.type].telt_mee).length;
  const vrijGebruikt = team.wissels.filter(w=>w.type && !WISSEL_TYPES[w.type].telt_mee).length;
  const wisselLogRows = STATE.wisselLog.map((l,i)=>({l,i})).filter(x=>x.l.teamKey===team.key).sort((a,b)=>(b.l.ronde-a.l.ronde)).map(({l,i})=>{
    const typeInfo = l.type ? WISSEL_TYPES[l.type] : WISSEL_TYPES.regulier;
    return `<tr><td>Ronde ${l.ronde}</td><td>${l.uit ? esc(l.uit.naam)+' <span class="muted small">('+esc(l.uit.club)+')</span>' : '<span class="muted">–</span>'}</td>
      <td>&rarr;</td><td>${esc(l.in.naam)} <span class="muted small">(${esc(l.in.club)})</span></td>
      <td><span class="${typeInfo.badge||'pill'}" style="font-size:10px;">${typeInfo.telt_mee?'regulier':'vrij (transfer)'}</span></td>
      <td><span class="close-btn" title="verwijder logregel" data-remove-wissellog="${i}">✕</span></td></tr>`;
  }).join('') || '<tr><td colspan="6" class="muted">Nog geen wissels gelogd voor dit team.</td></tr>';

  el.innerHTML = `<div class="panel">
    <span class="close-btn" id="closeTeamDetail">✕ sluiten</span>
    <h2>${esc(team.teamnaam)} <span class="muted small">— ${esc(team.speler)}</span>
      <button class="btn small danger" style="margin-left:10px;" data-remove-team="${team.key}">team verwijderen</button>
    </h2>
    <div class="row" style="margin-bottom:10px;">
      <span class="pill">Formatie: <b>${formatie}</b></span>
      <span class="pill">Budget basis-11: <b>${fmtGeld(budget.basisGebruikt)}</b> / ${fmtGeld(DATA.spelregels.budget)}</span>
      <span class="pill">Resterend (basis): <b>${fmtGeld(budget.resterend)}</b></span>
      <span class="pill">Waarde reservebank: <b>${fmtGeld(budget.wisselsGebruikt)}</b> <span class="muted small">(apart budget bij wissel)</span></span>
      <span class="pill">Wissels: <b>${regulierGebruikt}/${maxWisselsVoorRonde(ronde)}</b> regulier${vrijGebruikt>0?` + <b>${vrijGebruikt}</b> vrij (transfer)`:''}</span>
      <span class="pill">Seizoenstotaal (origineel): <b>${origineelTotaal(team)??'-'}</b></span>
    </div>
    <div class="note">
      Ronde ${ronde}: met de <b>huidige selectie</b> toegepast op de wedstrijdgegevens van die ronde komt dit team op <b class="pts">${live.total}</b> punten (${live.gevonden}/${team.basis.length+team.wissels.length} spelers gevonden).
      ${orig!==null ? `Het <b>origineel</b> (zoals destijds vastgelegd) was <b>${orig}</b>${diff!==null ? ` (verschil: <b class="${diff===0?'diffzero':'diffnonzero'}">${diff>0?'+':''}${diff}</b>)` : ''}.` : ''}
      ${diff!==0 && diff!==null ? '<br><span class="small">Dit team heeft in de loop van het seizoen minstens één keer gewisseld (basis of reservebank). Het 25-26 bestand legt niet vast wanneer &mdash; daardoor kan de huidige selectie voor deze specifieke ronde afwijken van de selectie die destijds echt gold. Vul je zelf nieuwe wissels of rondes in, dan komt live altijd overeen met wat je hebt ingevoerd.</span>' : ''}
    </div>
    <h3>Basisopstelling</h3>
    <table><thead><tr><th>Pos</th><th>Speler</th><th>Club</th><th>Prijs</th><th>Status</th><th>Ronde ${ronde}</th><th></th></tr></thead><tbody>${basisRows}</tbody></table>
    <div class="row" style="margin-top:8px;">
      <select data-newbasis-club="${team.key}">${clubOptionsHTML(pbClub)}</select>
      <select data-newbasis-speler="${team.key}">${playerOptionsHTML(pbClub, pbSpeler)}</select>
      <button class="btn small primary" data-add-basis="${team.key}">+ speler toevoegen aan basis</button>
    </div>

    <h3 style="margin-top:18px;">Reservebank / wissels (max ${maxWisselsVoorRonde(ronde)} regulier + evt. vrije wissels bij transfer)</h3>
    <table><thead><tr><th>#</th><th>Pos</th><th>Speler</th><th>Club</th><th>Prijs</th><th>Periode</th><th>Type</th><th>Ronde ${ronde}</th><th></th></tr></thead><tbody>${wisselRows}</tbody></table>
    <div class="note small">Een wissel vervangt een speler uit de basisopstelling door een nieuwe speler (die op de reservebank komt). Kies wie eruit gaat, wie erin komt, vanaf welke ronde, en of het een <b>reguliere wissel</b> is (telt mee voor het maximum) of een <b>vrije wissel</b> (bijv. omdat het contract van de speler werd ontbonden/hij transfervrij werd &mdash; telt niet mee). Dit wordt exact gelogd, in tegenstelling tot het origineel bestand.</div>
    <div class="row" style="margin-top:8px;flex-wrap:wrap;">
      ${team.basis.length>0 ? `<label class="small muted">eruit (basis) <select data-newwissel-uit="${team.key}">${uitOptionsHTML}</select></label>` : '<span class="muted small">Geen basisspelers om te wisselen &mdash; wordt direct aan de reservebank toegevoegd.</span>'}
      <span class="muted">&rarr;</span>
      <label class="small muted">erin <select data-newwissel-club="${team.key}">${clubOptionsHTML(pwClub)}</select>
      <select data-newwissel-speler="${team.key}">${playerOptionsHTML(pwClub, pwSpeler)}</select></label>
      <label class="small muted">vanaf ronde <input type="number" min="1" max="34" value="${pwRonde}" data-newwissel-ronde="${team.key}" style="width:50px;"></label>
      <label class="small muted">type <select data-newwissel-type="${team.key}">${typeOptionsHTML}</select></label>
      <button class="btn small primary" data-add-wissel="${team.key}">+ wissel doorvoeren</button>
    </div>

    <h3 style="margin-top:18px;">Wisselhistorie</h3>
    <table><thead><tr><th>Ronde</th><th>Eruit</th><th></th><th>Erin</th><th>Type</th><th></th></tr></thead><tbody>${wisselLogRows}</tbody></table>

    <h3 style="margin-top:18px;">Seizoensverloop (per ronde)</h3>
    ${sparkline(team.totaal_weken)}
  </div>`;
  document.getElementById('closeTeamDetail').addEventListener('click', ()=>{ selectedTeamKey=null; el.innerHTML=''; });
}

/* ---- event delegation voor team-tabblad ---- */
document.addEventListener('change', (e)=>{
  const t = e.target;
  if(t.dataset.newbasisClub){ pendingBasisClub[t.dataset.newbasisClub] = t.value; delete pendingBasisSpeler[t.dataset.newbasisClub]; renderTeamDetail(); }
  else if(t.dataset.newbasisSpeler){ pendingBasisSpeler[t.dataset.newbasisSpeler] = t.value; }
  else if(t.dataset.newwisselClub){ pendingWisselClub[t.dataset.newwisselClub] = t.value; delete pendingWisselSpeler[t.dataset.newwisselClub]; renderTeamDetail(); }
  else if(t.dataset.newwisselSpeler){ pendingWisselSpeler[t.dataset.newwisselSpeler] = t.value; }
  else if(t.dataset.newwisselRonde){ pendingWisselRonde[t.dataset.newwisselRonde] = t.value; }
  else if(t.dataset.newwisselUit){ pendingWisselUit[t.dataset.newwisselUit] = t.value; }
  else if(t.dataset.newwisselType){ pendingWisselType[t.dataset.newwisselType] = t.value; }
});
document.addEventListener('click', (e)=>{
  const t = e.target;
  if(t.dataset.addBasis){
    const key = t.dataset.addBasis;
    const club = pendingBasisClub[key] || DATA.clubs[0];
    const naam = pendingBasisSpeler[key] || (playersOfClub(club)[0] && playersOfClub(club)[0].naam);
    addBasisSpeler(key, club, naam);
  }
  if(t.dataset.removeBasis!==undefined){
    removeBasisSpeler(t.dataset.removeBasis, Number(t.dataset.removeBasisIdx));
  }
  if(t.dataset.addWissel){
    const key = t.dataset.addWissel;
    const club = pendingWisselClub[key] || DATA.clubs[0];
    const naam = pendingWisselSpeler[key] || (playersOfClub(club)[0] && playersOfClub(club)[0].naam);
    const ronde = pendingWisselRonde[key] || STATE.huidigeRonde;
    const team = STATE.teams[key];
    const uitNaam = team && team.basis.length>0 ? (pendingWisselUit[key] || (team.basis[0] && team.basis[0].naam)) : null;
    const type = pendingWisselType[key] || 'regulier';
    addWissel(key, club, naam, ronde, uitNaam, type);
  }
  if(t.dataset.removeWissel!==undefined){
    removeWissel(t.dataset.removeWissel, Number(t.dataset.removeWisselIdx));
  }
  if(t.dataset.removeWissellog!==undefined){
    removeWisselLogEntry(Number(t.dataset.removeWissellog));
  }
  if(t.dataset.removeTeam){
    removeTeam(t.dataset.removeTeam);
  }
});
</script>
